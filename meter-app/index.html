<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счётчик коммунальных платежей</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-tachometer-alt"></i> Счётчик коммунальных платежей</h1>
            <button id="themeToggle" class="theme-btn"><i class="fas fa-moon"></i> Тёмная тема</button>
        </div>
        <div class="form-card">
            <h2>Добавить показание</h2>
            <form id="addForm">
                <label for="meterType">Тип счётчика:</label>
                <select id="meterType" required>
                    <option value="cold">❄️ Холодная вода</option>
                    <option value="hot">🔥 Горячая вода</option>
                    <option value="electric">⚡ Электричество</option>
                    <option value="gas">⛽ Газ</option>
                    <option value="heating">🌡️ Отопление</option>
                </select>
                <label for="meterValue">Показание (кВт·ч / м³ / Гкал):</label>
                <input type="number" id="meterValue" step="0.01" min="0" required placeholder="0.00">
                <label for="meterDate">Дата:</label>
                <input type="date" id="meterDate" required>
                <button type="submit"><i class="fas fa-save"></i> Сохранить</button>
            </form>
        </div>
        <div class="diff-card">
            <h2>📊 Разница между последними показаниями</h2>
            <div id="diffContainer" class="diff-grid"></div>
        </div>
        <div class="chart-card">
            <h2>📈 График показаний</h2>
            <div class="chart-controls">
                <label for="chartTypeSelect">Тип счётчика:</label>
                <select id="chartTypeSelect">
                    <option value="cold">❄️ Холодная вода</option>
                    <option value="hot">🔥 Горячая вода</option>
                    <option value="electric">⚡ Электричество</option>
                    <option value="gas">⛽ Газ</option>
                    <option value="heating">🌡️ Отопление</option>
                </select>
                <button id="updateChartBtn"><i class="fas fa-sync-alt"></i> Обновить график</button>
            </div>
            <canvas id="meterChart"></canvas>
        </div>
        <div class="history-card">
            <div class="history-header">
                <h2>📋 История показаний</h2>
                <div class="export-buttons">
                    <button id="exportCsvBtn"><i class="fas fa-file-csv"></i> CSV</button>
                    <button id="exportExcelBtn"><i class="fas fa-file-excel"></i> Excel</button>
                </div>
            </div>
            <div class="table-responsive">
                <table id="readingsTable">
                    <thead>
                        <tr>
                            <th>Тип</th>
                            <th>Значение</th>
                            <th>Дата</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button id="clearAllBtn" class="clear-btn"><i class="fas fa-trash-alt"></i> Очистить всё</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
